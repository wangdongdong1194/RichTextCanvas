<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" />
    <title>RichTextCanvas</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body,
      #app {
        width: 100%;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <input type="range" min="10" max="48" value="28" id="size">
      <input type="color" value="#222222" id="color">
      <input type="range" min="0.1" max="100" value="1" id="zoom">
      <div id="canvas-root" class="canvas-root"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
